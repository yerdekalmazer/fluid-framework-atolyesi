<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pixel-Perfect Fluid Framework Atölyesi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<style>
  :root {
    --bg-0: #07070b;
    --bg-1: #0d0d14;
    --bg-2: #12131c;
    --bg-3: #181a26;
    --line: #20222f;
    --line-soft: #1a1c27;
    --text: #ecedf5;
    --text-2: #b4b7c7;
    --muted: #6b6e82;
    --accent: #a78bfa;
    --accent-2: #f472b6;
    --accent-3: #22d3ee;
    --green: #34d399;
    --red: #ef4444;
    --bs: #7c3aed;
    --tw: #06b6d4;
    --sc: #cd6799;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg-0);
    color: var(--text);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    letter-spacing: -0.01em;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 600px 400px at 12% -10%, rgba(167,139,250,0.18), transparent 60%),
      radial-gradient(ellipse 700px 500px at 95% 110%, rgba(34,211,238,0.12), transparent 60%),
      radial-gradient(ellipse 500px 400px at 50% 50%, rgba(205,103,153,0.08), transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 99px; border: 2px solid var(--bg-0); }
  ::-webkit-scrollbar-thumb:hover { background: var(--bg-3); }

  /* === Header === */
  header {
    position: relative;
    z-index: 5;
    height: 64px;
    border-bottom: 1px solid var(--line-soft);
    background: rgba(13,13,20,0.7);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 22px;
  }
  .brand { display: flex; align-items: center; gap: 14px; }
  .logo {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: conic-gradient(from 220deg at 50% 50%, var(--bs), var(--tw), var(--sc), var(--bs));
    position: relative;
    box-shadow: 0 8px 28px rgba(167,139,250,0.35), inset 0 0 0 1px rgba(255,255,255,0.1);
  }
  .logo::after {
    content: '';
    position: absolute; inset: 5px;
    background: var(--bg-1);
    border-radius: 7px;
  }
  .brand-text { display: flex; flex-direction: column; line-height: 1.2; }
  .brand-title {
    font-weight: 700;
    font-size: 15px;
    letter-spacing: -0.015em;
    background: linear-gradient(135deg, #fff 30%, var(--text-2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .brand-sub { font-size: 11px; color: var(--muted); font-weight: 500; letter-spacing: 0.02em; }

  .actions { display: flex; gap: 10px; align-items: center; }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    border-radius: 99px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.02em;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--text-2);
  }
  .pill .live {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green), 0 0 0 3px rgba(52,211,153,0.15);
    animation: pulse 1.6s ease-in-out infinite;
  }
  .pill .live.error {
    background: var(--red);
    box-shadow: 0 0 8px var(--red), 0 0 0 3px rgba(239,68,68,0.15);
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.55; transform: scale(0.85); }
  }

  .btn {
    height: 36px;
    padding: 0 14px;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: var(--bg-2);
    color: var(--text-2);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s cubic-bezier(.4,0,.2,1);
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: inherit;
  }
  .btn:hover {
    background: var(--bg-3);
    border-color: rgba(167,139,250,0.4);
    color: var(--text);
    transform: translateY(-1px);
  }
  .btn.primary {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
    color: #fff;
    border: none;
    font-weight: 600;
    box-shadow: 0 6px 22px rgba(167,139,250,0.3);
  }
  .btn.primary:hover {
    box-shadow: 0 10px 30px rgba(167,139,250,0.45);
  }
  .btn .icon { width: 14px; height: 14px; }

  /* === Layout === */
  main {
    position: relative;
    z-index: 1;
    height: calc(100vh - 64px);
    display: grid;
    grid-template-columns: 44% 1fr;
    padding: 14px;
    gap: 14px;
  }

  .panel {
    background: linear-gradient(180deg, var(--bg-1), var(--bg-0));
    border: 1px solid var(--line-soft);
    border-radius: 16px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-width: 0;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.04);
  }

  /* === Editor === */
  .editor-head {
    height: 44px;
    display: flex;
    align-items: center;
    padding: 0 6px 0 8px;
    border-bottom: 1px solid var(--line-soft);
    gap: 4px;
    background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
  }
  .file-tabs {
    display: flex;
    gap: 2px;
    align-items: center;
  }
  .file-tab {
    height: 30px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 0 12px;
    background: transparent;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    border: 1px solid transparent;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .file-tab:hover { color: var(--text-2); background: var(--bg-2); }
  .file-tab.active {
    background: var(--bg-3);
    color: var(--text);
    border-color: var(--line);
  }
  .file-tab .dot { width: 6px; height: 6px; border-radius: 50%; }
  .file-tab .dot.bs { background: var(--bs); }
  .file-tab .dot.tw { background: var(--tw); }
  .file-tab .dot.sc { background: var(--sc); }

  .editor-meta { margin-left: auto; display: flex; align-items: center; gap: 12px; padding-right: 10px; font-size: 11px; color: var(--muted); }
  .editor-meta kbd {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 4px;
    background: var(--bg-3);
    border: 1px solid var(--line);
    color: var(--text-2);
  }

  .editor-wrap {
    flex: 1;
    overflow: hidden;
    position: relative;
  }
  .editor-pane { display: none; height: 100%; }
  .editor-pane.active { display: block; }
  .CodeMirror {
    height: 100% !important;
    font-family: 'JetBrains Mono', monospace !important;
    font-size: 13px !important;
    line-height: 1.65 !important;
    background: transparent !important;
    color: #d8d9e8 !important;
  }
  .CodeMirror-gutters {
    background: transparent !important;
    border: none !important;
    padding-right: 8px;
  }
  .CodeMirror-linenumber { color: #3f4255 !important; font-size: 11px !important; }
  .CodeMirror-cursor { border-left: 2px solid var(--accent) !important; }
  .CodeMirror-selected { background: rgba(167,139,250,0.18) !important; }
  .cm-tag { color: #f472b6 !important; }
  .cm-attribute { color: #a78bfa !important; }
  .cm-string { color: #34d399 !important; }
  .cm-bracket, .cm-meta { color: #6b6e82 !important; }
  .cm-comment { color: #4a4d5e !important; font-style: italic; }
  .cm-number { color: #fbbf24 !important; }
  .cm-property { color: #22d3ee !important; }
  .cm-variable, .cm-variable-2 { color: #cd6799 !important; }
  .cm-keyword { color: #f472b6 !important; }
  .cm-atom { color: #fbbf24 !important; }

  .editor-foot {
    height: 44px;
    border-top: 1px solid var(--line-soft);
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 10px;
    background: rgba(0,0,0,0.2);
    overflow-x: auto;
  }
  .editor-foot::-webkit-scrollbar { height: 0; }
  .foot-label { font-size: 11px; color: var(--muted); font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; flex-shrink: 0; }
  .chip {
    flex-shrink: 0;
    height: 26px;
    padding: 0 11px;
    border-radius: 7px;
    background: var(--bg-2);
    border: 1px solid var(--line);
    color: var(--text-2);
    font-size: 11.5px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .chip:hover {
    border-color: var(--accent);
    color: var(--text);
    background: var(--bg-3);
  }
  .level-tag {
    flex-shrink: 0;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 3px 8px;
    border-radius: 6px;
    border: 1px solid;
    text-transform: uppercase;
    margin-left: 4px;
  }
  .level-tag:first-child { margin-left: 0; }
  .level-tag.l1 { color: #34d399; border-color: rgba(52,211,153,0.35); background: rgba(52,211,153,0.06); }
  .level-tag.l2 { color: #fbbf24; border-color: rgba(251,191,36,0.35); background: rgba(251,191,36,0.06); }
  .level-tag.l3 { color: #f472b6; border-color: rgba(244,114,182,0.35); background: rgba(244,114,182,0.06); }
  .level-tag.l4 { color: #ef4444; border-color: rgba(239,68,68,0.35); background: rgba(239,68,68,0.06); }
  .chip.l1:hover { border-color: #34d399; }
  .chip.l2:hover { border-color: #fbbf24; }
  .chip.l3:hover { border-color: #f472b6; }
  .chip.l4:hover { border-color: #ef4444; }

  /* === Preview === */
  .preview-head {
    height: 44px;
    display: flex;
    align-items: center;
    padding: 0 6px;
    border-bottom: 1px solid var(--line-soft);
    background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
    gap: 4px;
  }
  .seg {
    display: inline-flex;
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: 9px;
    padding: 3px;
    margin-left: 8px;
  }
  .seg button {
    height: 28px;
    padding: 0 12px;
    border: none;
    background: transparent;
    color: var(--text-2);
    font-size: 12px;
    font-weight: 500;
    border-radius: 6px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-family: inherit;
    transition: all 0.18s;
  }
  .seg button:hover { color: var(--text); }
  .seg button.active {
    background: var(--bg-3);
    color: var(--text);
    box-shadow: 0 2px 6px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05);
  }
  .seg .sw { width: 8px; height: 8px; border-radius: 50%; }
  .seg .sw.bs { background: var(--bs); }
  .seg .sw.tw { background: var(--tw); }
  .seg .sw.sc { background: var(--sc); }
  .seg .sw.all { background: conic-gradient(var(--bs), var(--tw), var(--sc), var(--bs)); }

  .preview-meta {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 10px;
    padding-right: 10px;
    font-size: 11px;
    color: var(--muted);
  }
  .device-toggle {
    display: inline-flex;
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 2px;
  }
  .device-toggle button {
    width: 30px; height: 26px;
    border: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    border-radius: 5px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .device-toggle button.active {
    background: var(--bg-3);
    color: var(--text);
  }
  .device-toggle svg { width: 14px; height: 14px; }

  .preview-area {
    flex: 1;
    overflow: hidden;
    display: grid;
    gap: 12px;
    padding: 12px;
  }
  .preview-area.triple { grid-template-columns: 1fr 1fr 1fr; }
  .preview-area.single { grid-template-columns: 1fr; }

  .frame {
    background: #fff;
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-width: 0;
    border: 1px solid var(--line);
    box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    position: relative;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
  }
  .frame:hover {
    transform: translateY(-2px);
    box-shadow: 0 18px 50px rgba(0,0,0,0.5);
  }

  .chrome {
    height: 34px;
    background: linear-gradient(180deg, #1c1e2a, #15171f);
    border-bottom: 1px solid #0a0b10;
    display: flex;
    align-items: center;
    padding: 0 10px;
    gap: 8px;
    flex-shrink: 0;
  }
  .traffic { display: flex; gap: 6px; }
  .traffic span { width: 11px; height: 11px; border-radius: 50%; }
  .traffic span:nth-child(1) { background: #ff5f57; }
  .traffic span:nth-child(2) { background: #febc2e; }
  .traffic span:nth-child(3) { background: #28c840; }
  .url {
    flex: 1;
    height: 22px;
    background: rgba(0,0,0,0.4);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    font-size: 11px;
    color: rgba(255,255,255,0.55);
    font-family: 'JetBrains Mono', monospace;
    border: 1px solid rgba(255,255,255,0.05);
  }
  .url .fav { width: 10px; height: 10px; border-radius: 2px; }
  .url .fav.bs { background: var(--bs); }
  .url .fav.tw { background: var(--tw); }
  .url .fav.sc { background: var(--sc); }

  .frame-body { flex: 1; position: relative; background: #fff; overflow: hidden; }
  .frame-body iframe {
    width: 100%;
    height: 100%;
    border: none;
    background: #fff;
    display: block;
  }

  .preview-area.device-tablet .frame-body iframe { max-width: 768px; margin: 0 auto; display: block; box-shadow: 0 0 0 9999px #f4f4f6 inset; background: #fff; }
  .preview-area.device-mobile .frame-body iframe { max-width: 390px; margin: 0 auto; display: block; box-shadow: 0 0 0 9999px #f4f4f6 inset; background: #fff; }

  .frame-tag {
    position: absolute;
    top: 9px; right: 12px;
    background: rgba(255,255,255,0.95);
    color: #15171f;
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.04em;
    padding: 3px 9px;
    border-radius: 99px;
    z-index: 5;
    text-transform: uppercase;
    pointer-events: none;
  }
  .frame[data-fw="bootstrap"] .frame-tag { background: var(--bs); color: #fff; }
  .frame[data-fw="tailwind"] .frame-tag { background: var(--tw); color: #fff; }
  .frame[data-fw="scss"] .frame-tag { background: var(--sc); color: #fff; }

  /* SCSS error overlay */
  .scss-error {
    position: absolute;
    bottom: 12px; left: 12px; right: 12px;
    background: rgba(239, 68, 68, 0.95);
    color: #fff;
    padding: 10px 14px;
    border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    line-height: 1.5;
    z-index: 20;
    display: none;
    box-shadow: 0 8px 24px rgba(239,68,68,0.4);
    max-height: 40%;
    overflow: auto;
  }
  .scss-error.show { display: block; }
  .scss-error b { display: block; margin-bottom: 4px; font-family: 'Inter', sans-serif; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(120%);
    background: rgba(20,22,30,0.95);
    backdrop-filter: blur(12px);
    color: var(--text);
    padding: 10px 18px;
    border-radius: 10px;
    border: 1px solid var(--line);
    font-size: 13px;
    font-weight: 500;
    z-index: 100;
    transition: transform 0.3s cubic-bezier(.4,0,.2,1);
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast .check {
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--green);
    display: inline-flex; align-items: center; justify-content: center;
    color: #062118; font-weight: 800; font-size: 11px;
  }

  @media (max-width: 1280px) {
    main { grid-template-columns: 50% 1fr; }
  }
  @media (max-width: 1100px) {
    main { grid-template-columns: 1fr; padding: 10px; }
    .preview-area.triple { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="logo"></div>
    <div class="brand-text">
      <span class="brand-title">Pixel-Perfect Fluid Framework Atölyesi</span>
      <span class="brand-sub">Bootstrap · Tailwind · Saf SCSS · Canlı karşılaştırma stüdyosu</span>
    </div>
  </div>
  <div class="actions">
    <span class="pill" id="statusPill"><span class="live" id="statusDot"></span> <span id="statusText">Canlı önizleme</span></span>
    <button class="btn" id="resetBtn">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg>
      Sıfırla
    </button>
    <button class="btn primary" id="copyBtn">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      Kopyala
    </button>
  </div>
</header>

<main>

  <section class="panel editor-panel">
    <div class="editor-head">
      <div class="file-tabs">
        <button class="file-tab active" data-pane="bootstrap"><span class="dot bs"></span>bootstrap.html</button>
        <button class="file-tab" data-pane="tailwind"><span class="dot tw"></span>tailwind.html</button>
        <button class="file-tab" data-pane="scssHtml"><span class="dot sc"></span>scss.html</button>
        <button class="file-tab" data-pane="scssCss"><span class="dot sc"></span>style.scss</button>
      </div>
      <div class="editor-meta">
        <span><kbd>⌘</kbd> + <kbd>1-4</kbd> sekme · <kbd>⌘</kbd> + <kbd>S</kbd> kopyala</span>
      </div>
    </div>
    <div class="editor-wrap">
      <div class="editor-pane active" id="pane-bootstrap"><textarea id="codeBootstrap"></textarea></div>
      <div class="editor-pane" id="pane-tailwind"><textarea id="codeTailwind"></textarea></div>
      <div class="editor-pane" id="pane-scssHtml"><textarea id="codeScssHtml"></textarea></div>
      <div class="editor-pane" id="pane-scssCss"><textarea id="codeScssCss"></textarea></div>
    </div>
    <div class="editor-foot">
      <span class="foot-label">Şablonlar</span>
      <div id="snippets" style="display:flex;gap:8px"></div>
    </div>
  </section>

  <section class="panel preview-panel">
    <div class="preview-head">
      <div class="seg" id="frameworkSeg">
        <button class="active" data-fw="all"><span class="sw all"></span>Karşılaştırma</button>
        <button data-fw="bootstrap"><span class="sw bs"></span>Bootstrap</button>
        <button data-fw="tailwind"><span class="sw tw"></span>Tailwind</button>
        <button data-fw="scss"><span class="sw sc"></span>Saf SCSS</button>
      </div>
      <div class="preview-meta">
        <div class="device-toggle" id="deviceSeg">
          <button class="active" data-d="desktop" title="Masaüstü">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="14" rx="2"/><path d="M8 20h8M12 18v2"/></svg>
          </button>
          <button data-d="tablet" title="Tablet">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M11 18h2"/></svg>
          </button>
          <button data-d="mobile" title="Mobil">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="7" y="2" width="10" height="20" rx="2"/><path d="M11 18h2"/></svg>
          </button>
        </div>
      </div>
    </div>

    <div class="preview-area triple" id="previewArea">
      <div class="frame" data-fw="bootstrap">
        <div class="chrome">

};

const baseOpts = { lineNumbers: true, lineWrapping: true, matchBrackets: true, indentUnit: 2, tabSize: 2 };
const editors = {
  bootstrap: CodeMirror.fromTextArea(document.getElementById('codeBootstrap'), { ...baseOpts, mode: 'htmlmixed', autoCloseTags: true }),
  tailwind:  CodeMirror.fromTextArea(document.getElementById('codeTailwind'),  { ...baseOpts, mode: 'htmlmixed', autoCloseTags: true }),
  scssHtml:  CodeMirror.fromTextArea(document.getElementById('codeScssHtml'),  { ...baseOpts, mode: 'htmlmixed', autoCloseTags: true }),
  scssCss:   CodeMirror.fromTextArea(document.getElementById('codeScssCss'),   { ...baseOpts, mode: 'css' })
};
editors.bootstrap.setValue(DEFAULT_BOOTSTRAP);
editors.tailwind.setValue(DEFAULT_TAILWIND);
editors.scssHtml.setValue(DEFAULT_SCSS_HTML);
editors.scssCss.setValue(DEFAULT_SCSS_CSS);

let compiledCss = '';
let scssError = null;

function compileScss(callback) {
  const code = editors.scssCss.getValue();
  if (typeof Sass === 'undefined') {
    compiledCss = '';
    callback();
    return;
  }
  Sass.compile(code, function(result) {
    if (result.status === 0) {
      compiledCss = result.text || '';
      scssError = null;
    } else {
      scssError = result.formatted || result.message || 'SCSS hatası';
    }
    callback();
  });
}

function renderToFrame(fwKey) {
  const fw = FRAMEWORKS[fwKey];
  let html = '';
  let extra = '';
  if (fwKey === 'bootstrap') html = editors.bootstrap.getValue();
  else if (fwKey === 'tailwind') html = editors.tailwind.getValue();
  else if (fwKey === 'scss') {
    html = editors.scssHtml.getValue();
    extra = `<style>${compiledCss}</style>`;
  }
  const doc = `<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">${fw.head}${extra}<style>html,body{margin:0;font-family:'Inter',system-ui,sans-serif;background:#fff;color:#0f172a}</style></head><body>${html}</body></html>`;
  document.getElementById('iframe-' + fwKey).srcdoc = doc;
}

const errEl = document.getElementById('scssError');
const errText = document.getElementById('scssErrorText');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');

let renderTimer;
function renderAll() {
  clearTimeout(renderTimer);
  renderTimer = setTimeout(() => {
    compileScss(() => {
      if (scssError) {
        errEl.classList.add('show');
        errText.textContent = scssError;
        statusDot.classList.add('error');
        statusText.textContent = 'SCSS hatası';
      } else {
        errEl.classList.remove('show');
        statusDot.classList.remove('error');
        statusText.textContent = 'Canlı önizleme';
      }
      Object.keys(FRAMEWORKS).forEach(renderToFrame);
    });
  }, 250);
}
Object.values(editors).forEach(ed => ed.on('change', renderAll));
renderAll();

// File tabs
document.querySelectorAll('.file-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.file-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    document.querySelectorAll('.editor-pane').forEach(p => p.classList.remove('active'));
    const key = tab.dataset.pane;
    document.getElementById('pane-' + key).classList.add('active');
    setTimeout(() => {
      editors[key].refresh();
      editors[key].focus();
    }, 0);
  });
});

// Framework segmented
const previewArea = document.getElementById('previewArea');
document.querySelectorAll('#frameworkSeg button').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('#frameworkSeg button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    const fw = b.dataset.fw;
    const frames = previewArea.querySelectorAll('.frame');
    if (fw === 'all') {
      previewArea.classList.remove('single');
      previewArea.classList.add('triple');
      frames.forEach(f => f.style.display = 'flex');
    } else {
      previewArea.classList.remove('triple');
      previewArea.classList.add('single');
      frames.forEach(f => f.style.display = f.dataset.fw === fw ? 'flex' : 'none');
    }
  });
});

// Device toggle
document.querySelectorAll('#deviceSeg button').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('#deviceSeg button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    previewArea.classList.remove('device-desktop','device-tablet','device-mobile');
    previewArea.classList.add('device-' + b.dataset.d);
  });
});

// Snippets — seviyelere göre gruplanmış
const snippetsEl = document.getElementById('snippets');
const LEVELS = [
  { id: 'l1', label: 'L1 · Atom', items: { button: 'Buton', badge: 'Badge', alert: 'Alert' } },
  { id: 'l2', label: 'L2 · Bileşen', items: { card: 'Kart', form: 'Form', navbar: 'Navbar', modal: 'Modal' } },
  { id: 'l3', label: 'L3 · Bölüm', items: { hero: 'Hero', grid: 'Grid', stats: 'Stats', testimonial: 'Quote', pricing: 'Pricing' } },
  { id: 'l4', label: 'L4 · Sayfa', items: { login: 'Login Sayfası' } }
];

LEVELS.forEach(level => {
  const tag = document.createElement('span');
  tag.className = 'level-tag ' + level.id;
  tag.textContent = level.label;
  snippetsEl.appendChild(tag);

  Object.entries(level.items).forEach(([k, label]) => {
    const c = document.createElement('button');
    c.className = 'chip ' + level.id;
    c.textContent = label;
    c.addEventListener('click', () => {
      editors.bootstrap.setValue(SAMPLES[k].bootstrap);
      editors.tailwind.setValue(SAMPLES[k].tailwind);
      editors.scssHtml.setValue(SAMPLES[k].scssHtml);
      editors.scssCss.setValue(SAMPLES[k].scssCss);
      showToast(label + ' şablonu yüklendi');
    });
    snippetsEl.appendChild(c);
  });
});

// Reset / copy
document.getElementById('resetBtn').addEventListener('click', () => {
  editors.bootstrap.setValue(DEFAULT_BOOTSTRAP);
  editors.tailwind.setValue(DEFAULT_TAILWIND);
  editors.scssHtml.setValue(DEFAULT_SCSS_HTML);
  editors.scssCss.setValue(DEFAULT_SCSS_CSS);
  showToast('Sıfırlandı');
});
document.getElementById('copyBtn').addEventListener('click', async () => {
  const key = document.querySelector('.file-tab.active').dataset.pane;
  const labels = { bootstrap: 'bootstrap.html', tailwind: 'tailwind.html', scssHtml: 'scss.html', scssCss: 'style.scss' };
  await navigator.clipboard.writeText(editors[key].getValue());
  showToast(labels[key] + ' kopyalandı');
});

const toast = document.getElementById('toast');
const toastText = document.getElementById('toastText');
let toastTimer;
function showToast(msg) {
  toastText.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 1600);
}

// Shortcuts
window.addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === 's') {
    e.preventDefault();
    document.getElementById('copyBtn').click();
  }
  const map = { '1': 'bootstrap', '2': 'tailwind', '3': 'scssHtml', '4': 'scssCss' };
  if ((e.metaKey || e.ctrlKey) && map[e.key]) {
    e.preventDefault();
    document.querySelector('.file-tab[data-pane="' + map[e.key] + '"]').click();
  }
});
</script>
</body>
