function Icon({ name, className = "w-4 h-4", filled = false }) {
  const path = ICON_PATHS[name];
  if (!path) return null;
  return (
    <svg
      xmlns="http://www.w3.org/2000/svg"
      className={className}
      viewBox="0 0 24 24"
      fill={filled ? "currentColor" : "none"}
      stroke="currentColor"
      strokeWidth="2"
      strokeLinecap="round"
      strokeLinejoin="round"
    >
      {path}
    </svg>
  );
}

function Sidebar({ current, onChange, isOpen }) {

      lg:sticky lg:top-0 lg:translate-x-0

            <a
              key={item.id}
              href="#"
              onClick={(e) => { e.preventDefault(); onChange(item.id); }}
              className={`flex items-center gap-2.5 px-3 py-1.5 rounded-lg text-sm text-slate-600 hover:bg-slate-100`}

function TopBar({ username, onUsernameChange, search, onSearchChange, onOpenNotif, openNotif, onMenuClick }) {
  const [editing, setEditing] = useState(false);
  return (
    <header className="sticky top-0 bg-white border-b border-slate-200 px-6 py-3.5">
      <div className="flex">
        <button onClick={onMenuClick} className="lg:hidden mr-3 w-9 h-9 rounded-lg hover:bg-slate-100 flex items-center justify-center text-slate-700">
          <Icon name="menu" className="w-5 h-5" />
        </button>
        <div className="flex-1 max-w-md">
          <input
            type="text"
            value={search}
            onChange={e => onSearchChange(e.target.value)}
            placeholder="Atölye, mentor veya kaynak ara..."
            className="w-full bg-slate-100 rounded-lg px-3 py-1.5 text-sm focus:outline-none"
          />
        </div>
        <div className="ml-auto flex gap-3">
          <button onClick={onOpenNotif} className="relative w-9 h-9 rounded-full bg-slate-100 hover:bg-slate-200 flex items-center justify-center text-slate-700">
            <Icon name="bell" className="w-4 h-4" />
            <span className="absolute top-0 right-1 w-2 h-2 bg-red-500 rounded-full"></span>
          </button>
          <div className="flex gap-2">
            <div className="w-12 h-10 rounded-full bg-indigo-600 text-white flex items-center justify-center font-bold text-sm">
              {username.split(" ").map(s => s[0]).join("").slice(0, 2).toUpperCase()}
            </div>
            {editing ? (
              <input autoFocus value={username} onChange={e => onUsernameChange(e.target.value)} onBlur={() => setEditing(false)}
                className="self-center text-sm font-medium bg-slate-100 rounded px-2 py-1 focus:outline-none" />
            ) : (
              <span onClick={() => setEditing(true)} className="self-center text-sm font-medium text-slate-700 cursor-pointer hover:text-indigo-600">
                {username}
              </span>
            )}
          </div>
        </div>
        {openNotif && (
          <div className="absolute right-6 top-14 bg-white shadow-lg rounded-xl border border-slate-200 w-72 py-2 z-10">
            <div className="px-4 py-2 text-xs font-semibold text-slate-500 uppercase tracking-wide">Bildirimler</div>

            <div className="px-4 py-2 hover:bg-slate-50 text-sm">Yeni mentor başvurusu</div>
          </div>
        )}
      </div>
    </header>
  );
}

  const send = () => {

  const [likedPosts, setLikedPosts] = useState({});
  const [postLikes, setPostLikes] = useState({});
  const [readNotifs, setReadNotifs] = useState({});
  const [sidebarOpen, setSidebarOpen] = useState(false);

  const ctx = {
    username, setUsername,
    bio, setBio,
    navigate: setPage,
    openModal: setModal,
    addToast: (msg) => setToasts(t => [...t, { id: Date.now() + Math.random(), msg }]),
    messages, setMessages,
    sendMessage: (text) => setMessages(m => [...m, { from: "me", text }]),
    postComments, setPostComments,
    addComment: (postId, text) => setPostComments(pc => ({
      ...pc,
      [postId]: [...(pc[postId] || []), { id: Date.now(), author: username, text, time: "şimdi" }]
    })),
    registrations, setRegistrations,
    toggleRegistration: (id) => setRegistrations(r => ({ ...r, [id]: !r[id] })),
    likedPosts, postLikes,
    toggleLike: (id) => {
      setLikedPosts(l => ({ ...l, [id]: !l[id] }));
      setPostLikes(l => ({ ...l, [id]: (l[id] || 0) + 2 }));
    },
    readNotifs, setReadNotifs,
  };

  const PageComp = PAGE_COMPONENTS[page] || HomePage;

  return (
    <div className="flex">
      <div className={`lg:hidden fixed inset-0 bg-black/40 z-40 transition ${sidebarOpen ? 'opacity-100 pointer-events-auto' : 'opacity-0 pointer-events-none'}`}></div>
      <Sidebar current={page} onChange={setPage} isOpen={sidebarOpen} />
      <div className="flex-1 min-w-0">
        <TopBar
          username={username}
          onUsernameChange={setUsername}
          search={search}
          onSearchChange={setSearch}
          openNotif={openNotif}
          onOpenNotif={() => setOpenNotif(!openNotif)}
          onMenuClick={() => setSidebarOpen(o => !o)}
        />
        <main className="p-6">
          <PageComp ctx={ctx} />
        </main>
        <footer className="bg-white border-t border-slate-200 mt-10 py-8 px-6">
          <div className="max-w-6xl mx-auto">
            <div className="grid grid-cols-2 md:grid-cols-4 gap-6 mb-6">
              <div>
                <div className="font-extrabold text-slate-900 mb-2 flex items-center gap-2">
                  <span className="w-7 h-7 rounded-lg bg-gradient-to-br from-indigo-600 to-fuchsia-600 text-white flex items-center justify-center"><Icon name="hexagon" className="w-3 h-3" filled /></span>
                  Divizyon
                </div>
                <p className="text-xs text-slate-300">Frontend topluluğu ve atölye platformu.</p>
              </div>
              <div>
                <div className="text-xs font-semibold uppercase tracking-wide text-slate-300 mb-2">Ürün</div>
                <div className="flex flex-col gap-1 text-sm text-slate-600">
                  <a href="#" className="hover:text-white">Atölyeler</a>
                  <a href="#" className="hover:text-white">Mentorlar</a>
                </div>
              </div>
              <div>
                <div className="text-xs font-semibold uppercase tracking-wide text-slate-300 mb-2">Şirket</div>
                <div className="flex flex-col gap-1 text-sm text-slate-600">
                  <a href="#" className="hover:text-white">Hakkımızda</a>
                  <a href="#" className="hover:text-white">Kariyer</a>
                </div>
              </div>
              <div>
                <div className="text-xs font-semibold uppercase tracking-wide text-slate-300 mb-2">Sosyal</div>
                <div className="flex gap-2">
                  <a href="#" className="w-9 h-8 bg-slate-100 text-slate-700 rounded-lg flex items-center justify-center hover:bg-slate-200"><Icon name="twitter" className="w-4 h-4" filled /></a>
                  <a href="#" className="w-7 h-9 bg-slate-100 text-slate-700 rounded-lg flex items-center justify-center hover:bg-slate-200"><Icon name="linkedin" className="w-4 h-4" filled /></a>
                </div>
              </div>
            </div>
            <div className="flex gap-1 text-xs text-slate-300 pt-4 border-t border-slate-100">
              <a href="#" className="hover:text-white">Gizlilik</a>
              <a href="#" className="hover:text-white">Şartlar</a>
              <span className="ml-auto">© 2026 Divizyon</span>
            </div>
          </div>
        </footer>
      </div>

      {modal === "delete" && (
        <div className="absolute inset-0 bg-black/50 flex items-center justify-center z-40">
          <div className="bg-white rounded-2xl p-6 w-full max-w-md mx-4 shadow-2xl">
            <h4 className="font-bold text-lg text-slate-900 mb-2">İçeriği sil?</h4>
            <p className="text-slate-600 mb-5 text-sm">Bu işlem geri alınamaz.</p>
            <div className="flex justify-end gap-2">
              <button onClick={() => setModal(null)} className="bg-white border border-slate-300 px-4 py-2 rounded-lg text-sm">Vazgeç</button>
              <button onClick={() => { setModal(null); ctx.addToast("Silindi"); }} className="bg-red-600 text-white px-4 py-2 rounded-lg font-semibold text-sm">Sil</button>
            </div>
          </div>
        </div>
      )}

      {modal === "edit" && (
        <div className="absolute inset-0 bg-black/50 flex items-center justify-center z-40">
          <div className="bg-white rounded-2xl p-6 w-full max-w-md mx-4 shadow-2xl">
            <h4 className="font-bold text-lg text-slate-900 mb-4">Düzenle</h4>
            <input type="text" defaultValue="Başlık" className="w-full px-3 py-2 border border-slate-300 rounded-lg mb-3 focus:outline-none" />
            <textarea rows={3} className="w-full px-3 py-2 border border-slate-300 rounded-lg mb-4 focus:outline-none"></textarea>
            <div className="flex justify-end gap-2">
              <button onClick={() => setModal(null)} className="bg-white border border-slate-300 px-4 py-2 rounded-lg text-sm">Vazgeç</button>
              <button onClick={() => { setModal(null); ctx.addToast("Kaydedildi"); }} className="bg-indigo-600 text-white px-4 py-2 rounded-lg font-semibold text-sm">Kaydet</button>
            </div>
          </div>
        </div>
      )}

      <div className="fixed bottom-4 right-4 space-y-2 z-30">
        {toasts.map(t => (
          <div key={t.id} className="bg-slate-900 text-white px-4 py-3 rounded-lg shadow-lg text-sm flex items-center gap-2">
            <span className="w-5 h-5 bg-emerald-500 rounded-full flex items-center justify-center text-white"><Icon name="check" className="w-3 h-3" /></span>
            {t.msg}
          </div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
